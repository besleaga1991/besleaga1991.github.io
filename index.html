<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Development</title>
    <style>
        /* Fundal modern și centrare totală */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f7f6; /* Gri foarte deschis */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Cardul alb central */
        .card {
            background-color: #ffffff;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 90%;
        }

        /* Stil pentru textul principal */
        h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Stil pentru copyright */
        .footer {
            color: #777;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            padding-top: 20px;
            margin-top: 20px;
        }

        /* O mică animație la încărcare */
        .card {
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>This website is under development</h1>
        
        <div class="footer">
            &copy; 2026 Beșleagă Alexandru Marian
        </div>
    </div>

</body>
</html>
