<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
    <div class="payment-card">
        <h1>Website Basic</h1>
        <span class="price">3.000,00 RON</span>
        <p style="color: var(--text-light); margin-bottom: 30px;">Servicii profesionale de dezvoltare web</p>
        
        <a href="https://buy.stripe.com/8x2eVcgsY5cL1fH1iz4Ja00" class="stripe-button">
            Comanda
        </a>
    </div>

    <div class="footer-links">
        <a href="javascript:void(0)" onclick="showLegal('terms')">Termeni și Condiții</a>
        <a href="javascript:void(0)" onclick="showLegal('privacy')">Politică de Confidențialitate</a>
        <a href="javascript:void(0)" onclick="showLegal('contact')">Contact</a>
        
        <div class="copyright" id="copyright-notice"></div>
    </div>
</div>

<div id="legalModal" class="modal">
    <div class="modal-content-wrapper" onclick="closeModal()">
        <div class="legal-card" onclick="event.stopPropagation()">
            <div id="legalText"></div>
            <button class="close-button" onclick="closeModal()">Am înțeles</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
