<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redactare</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Optimizări pentru Mobil */
        @media (max-width: 480px) {
            .wrapper {
                padding: 10px;
            }
            .payment-card {
                padding: 20px; /* Reducem spațiul interior pe mobil */
            }
            h1 {
                font-size: 20px;
            }
            .price {
                font-size: 20px !important;
            }
            .editor-field {
                font-size: 14px !important;
            }
            #sec-text {
                height: 250px; /* Puțin mai scund pe ecrane mici */
            }
            .stripe-button {
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="payment-card" style="max-width: 600px; width: 100%;">
        <h1>Website</h1>
        <span class="price" style="font-size: 24px;">Conținut</span>
        
        <!-- Input pentru titlu secțiune -->
        <input type="text" id="sec-title" class="editor-field" placeholder="Ex: Meniu, Despre noi, Contact..."
               style="border: 1px solid #e6ebf1; border-radius: 8px; padding: 12px; margin-bottom: 15px; width: 100%; box-sizing: border-box; font-family: inherit; text-align: center;">
        
        <!-- Chenar pentru text -->
        <textarea id="sec-text" class="editor-field" placeholder="Scrie aici conținutul pe care îl dorești pe site pentru acesta sectiune din site..."
                  style="border: 1px solid #e6ebf1; border-radius: 8px; padding: 15px; width: 100%; height: 300px; box-sizing: border-box; font-family: inherit; resize: none; line-height: 1.6;"></textarea>

        <div style="margin-top: 20px;">
            <button onclick="downloadDirectPDF()" class="stripe-button" style="width: 100%; background: var(--stripe-blue);">
                Descarcă PDF
            </button>
        </div>
        
        <a href="index.html" class="anaf-sub-link" style="text-align: center; margin-top: 20px; display: block; color: var(--text-light); text-decoration: none; font-size: 13px;">
            ← Înapoi la pagina principală
        </a>
    </div>

    <!-- Textul gri sub card -->
    <p style="color: var(--text-light); font-size: 12px; margin-top: 20px; max-width: 400px; text-align: center; line-height: 1.4; padding: 0 15px;">
        Aici puteți completa conținutul pe care îl doriți sa fie afișat pe site in format pdf, pdf-urile cu conținutul site-ului trebuie trimise la adresa <span style="text-decoration: underline;">besleaga.1991@icloud.com</span>
    </p>
</div>

<script>
    function downloadDirectPDF() {
        const titleValue = document.getElementById('sec-title').value.trim() || "Sectiune Fara Titlu";
        const bodyValue = document.getElementById('sec-text').value.trim();

        if (!bodyValue) {
            alert("Te rugăm să completezi conținutul înainte de descărcare.");
            return;
        }

        const cleanTitle = titleValue.replace(/[()\\]/g, "");
        const cleanBody = bodyValue.replace(/[()\\]/g, "");

        const pdfData = [
            "%PDF-1.1",
            "1 0 obj << /Type /Catalog /Pages 2 0 R >> endobj",
            "2 0 obj << /Type /Pages /Kids [3 0 R] /Count 1 >> endobj",
            "3 0 obj << /Type /Page /Parent 2 0 R /Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >> endobj",
            "4 0 obj << /Type /Font /Subtype /Type1 /BaseFont /Helvetica >> endobj",
            "5 0 obj << /Length 2000 >> stream",
            "BT",
            "/F1 14 Tf 20 750 Td (" + cleanTitle.toUpperCase() + ":) Tj",
            "/F1 11 Tf 0 -30 Td (" + cleanBody.substring(0, 1000).replace(/\n/g, ") Tj 0 -15 Td (") + ") Tj",
            "ET",
            "endstream endobj",
            "xref",
            "0 6",
            "0000000000 65535 f",
            "trailer << /Size 6 /Root 1 0 R >>",
            "startxref 500",
            "%%EOF"
        ].join("\n");

        const blob = new Blob([pdfData], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${cleanTitle.replace(/\s+/g, '_')}.pdf`;
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
