<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="payment-card" style="max-width: 500px;">
            <h1>Curriculum Vitae</h1>
            
            <p style="background: #f0f4f8; padding: 15px; border-radius: 8px; border-left: 4px solid var(--stripe-blue); margin-bottom: 25px; font-size: 13px; color: var(--text-dark); text-align: left; line-height: 1.5;">
                <strong>Nota informativă:</strong> Completați doar secțiunile care vă reprezintă. Lăsați gol câmpurile unde nu doriți să apară informații în PDF.
            </p>
            
            <div style="text-align: left;">
                <label style="color: var(--text-light); font-size: 11px; font-weight: bold; text-transform: uppercase;">Nume Complet</label>
                <input type="text" id="cvName" placeholder="Ex: Popescu Ion" style="width:100%; margin-bottom:15px; padding:12px; border:1px solid var(--line-color); border-radius:8px; outline:none; font-family: inherit;">
                
                <label style="color: var(--text-light); font-size: 11px; font-weight: bold; text-transform: uppercase;">Email Contact</label>
                <input type="email" id="cvEmail" placeholder="email@exemplu.com" style="width:100%; margin-bottom:15px; padding:12px; border:1px solid var(--line-color); border-radius:8px; outline:none; font-family: inherit;">
                
                <label style="color: var(--text-light); font-size: 11px; font-weight: bold; text-transform: uppercase;">Liceu</label>
                <input type="text" id="cvHighschool" placeholder="Nume liceu / Profil" style="width:100%; margin-bottom:15px; padding:12px; border:1px solid var(--line-color); border-radius:8px; outline:none; font-family: inherit;">

                <label style="color: var(--text-light); font-size: 11px; font-weight: bold; text-transform: uppercase;">Facultate</label>
                <input type="text" id="cvUniversity" placeholder="Universitate / Facultate" style="width:100%; margin-bottom:15px; padding:12px; border:1px solid var(--line-color); border-radius:8px; outline:none; font-family: inherit;">

                <label style="color: var(--text-light); font-size: 11px; font-weight: bold; text-transform: uppercase;">Abilități</label>
                <input type="text" id="cvSkills" placeholder="Ex: Engleza, Programare..." style="width:100%; margin-bottom:15px; padding:12px; border:1px solid var(--line-color); border-radius:8px; outline:none; font-family: inherit;">

                <label style="color: var(--text-light); font-size: 11px; font-weight: bold; text-transform: uppercase;">Comentariu</label>
                <textarea id="cvComment" placeholder="Alte mențiuni..." style="width:100%; height:80px; margin-bottom:20px; padding:12px; border:1px solid var(--line-color); border-radius:8px; outline:none; font-family:inherit; resize: none;"></textarea>
            </div>

            <a href="https://buy.stripe.com/eVqdR84Kg48H0bDf9p4Ja01" id="payBtn" target="_blank" class="stripe-button">
                1. Plătește 25 RON
            </a>

            <div id="unlockSection" style="margin-top: 20px; border-top: 1px solid var(--line-color); padding-top: 20px;">
                <label style="color: var(--text-light); font-size: 11px; font-weight: bold; text-transform: uppercase;">2. Introdu Codul primit după plată</label>
                <input type="text" id="downloadCode" placeholder="Plătește pentru cod" style="width:100%; margin-top:5px; margin-bottom:10px; padding:12px; border:1px solid var(--line-color); border-radius:8px; outline:none; text-align: center; font-weight: bold; font-family: inherit;">
                <button id="unlockBtn" class="stripe-button" onclick="checkCode()">Verifică Cod</button>
            </div>

            <button id="downloadBtn" class="stripe-button" style="display:none; margin-top:10px;" onclick="downloadDirectPDF()">Descarcă PDF</button>
            <a href="index.html" style="margin-top: 20px; color: var(--text-light); font-size: 13px; text-decoration: none;">← Înapoi</a>
        </div>
    </div>

    <script>
        function checkCode() {
            if (document.getElementById('downloadCode').value.trim() === "CV-2026") {
                document.getElementById('unlockSection').style.display = 'none';
                document.getElementById('payBtn').style.display = 'none';
                document.getElementById('downloadBtn').style.display = 'block';
                downloadDirectPDF();
            } else { alert("Cod incorect!"); }
        }

        function downloadDirectPDF() {
            const nume = (document.getElementById('cvName').value.trim() || "-").replace(/[()\\]/g, "");
            const email = (document.getElementById('cvEmail').value.trim() || "-").replace(/[()\\]/g, "");
            const liceu = (document.getElementById('cvHighschool').value.trim() || "-").replace(/[()\\]/g, "");
            const facultate = (document.getElementById('cvUniversity').value.trim() || "-").replace(/[()\\]/g, "");
            const abilitati = (document.getElementById('cvSkills').value.trim() || "-").replace(/[()\\]/g, "");
            const comentariu = (document.getElementById('cvComment').value.trim() || "-").replace(/[()\\]/g, "");

            const pdfData = [
                "%PDF-1.1",
                "1 0 obj << /Type /Catalog /Pages 2 0 R >> endobj",
                "2 0 obj << /Type /Pages /Kids [3 0 R] /Count 1 >> endobj",
                "3 0 obj << /Type /Page /Parent 2 0 R /Resources << /Font << /F1 4 0 R /F2 6 0 R >> >> /Contents 5 0 R >> endobj",
                "4 0 obj << /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >> endobj",
                "6 0 obj << /Type /Font /Subtype /Type1 /BaseFont /Helvetica >> endobj",
                "5 0 obj << /Length 2000 >> stream",
                "BT",
                "50 730 Td", // Coborât titlul mai jos pentru a nu fi tăiat
                "0 0 0 rg", // Culoare NEAGRĂ pentru titlu
                "/F1 18 Tf (CURRICULUM VITAE) Tj",
                "0 -60 Td",
                "0.4 0.45 0.9 rg", "/F1 10 Tf (NUME COMPLET) Tj", "0 -18 Td", "0 0 0 rg", "/F2 12 Tf (" + nume + ") Tj", "0 -40 Td",
                "0.4 0.45 0.9 rg", "/F1 10 Tf (EMAIL) Tj", "0 -18 Td", "0 0 0 rg", "/F2 12 Tf (" + email + ") Tj", "0 -40 Td",
                "0.4 0.45 0.9 rg", "/F1 10 Tf (LICEU) Tj", "0 -18 Td", "0 0 0 rg", "/F2 12 Tf (" + liceu + ") Tj", "0 -40 Td",
                "0.4 0.45 0.9 rg", "/F1 10 Tf (FACULTATE) Tj", "0 -18 Td", "0 0 0 rg", "/F2 12 Tf (" + facultate + ") Tj", "0 -40 Td",
                "0.4 0.45 0.9 rg", "/F1 10 Tf (ABILITATI) Tj", "0 -18 Td", "0 0 0 rg", "/F2 12 Tf (" + abilitati + ") Tj", "0 -40 Td",
                "0.4 0.45 0.9 rg", "/F1 10 Tf (COMENTARIU) Tj", "0 -18 Td", "0 0 0 rg", "/F2 12 Tf (" + comentariu.substring(0, 80) + ") Tj",
                "ET",
                "endstream endobj",
                "xref", "0 7", "0000000000 65535 f",
                "trailer << /Size 7 /Root 1 0 R >>",
                "startxref 500", "%%EOF"
            ].join("\n");

            const blob = new Blob([pdfData], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `CV_${nume.replace(/\s+/g, '_')}.pdf`;
            link.click();
        }
    </script>
</body>
</html>
